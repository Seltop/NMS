# Skin-format entities - use the player's 64x64 UV layout, so the fragment shader
# should detect the LAYER2 (overlay) region on them. Every other entity defaults to
# entityId == 0 and gets LAYER1 only, which avoids the patchwork-rainbow bug that
# triggered on any entity with a square texture.
#
# Expand this list empirically: start minimal, add mobs only after confirming their
# overlay region behaves correctly with LAYER2 coloring.
entity.101 = minecraft:player newnpc:player_npc
