# Armor item IDs — matches WEM's convention so the fragment shader can detect armor
# by currentRenderedItemId instead of by texture aspect ratio. The old 2:1 heuristic
# mis-fires on mobs with 64x32 textures (blaze, enderman, ghast, shulker, etc.) and
# paints their bodies with the armor color palette.
